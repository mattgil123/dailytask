<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine</title>
    <style>
        :root {
            --bg-color: #0b0c0e;
            --card-bg: #16171a;
            --text-color: #f3f4f6;
            --text-muted: #8e939e;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --border-color: #26282c;
            --checked-color: #4b5263;
            --checkbox-border: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            padding: 1.5rem 1rem;
            max-width: 460px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin: 0;
            color: #ffffff;
        }

        .header-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        h2 {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .btn-refresh {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-refresh:hover {
            background-color: var(--card-bg);
            border-color: #4b5263;
        }

        .btn-save {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn-save:hover {
            background-color: #2563eb;
        }

        .routine-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.2rem 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 0.5rem;
        }

        .routine-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .routine-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .routine-item:last-child {
            border-bottom: none;
        }
