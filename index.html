<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine</title>
    <style>
        :root {
            --bg-color: #0b0c0e;
            --card-bg: #16171a;
            --text-color: #f3f4f6;
            --text-muted: #8e939e;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --border-color: #26282c;
            --checked-color: #4b5263;
            --checkbox-border: #6b7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.4;
            padding: 1.5rem 1rem;
            max-width: 460px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin: 0;
            color: #ffffff;
        }

        .header-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        h2 {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .btn-refresh {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-refresh:hover {
            background-color: var(--card-bg);
            border-color: #4b5263;
        }

        .btn-save {
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            width: 100%;
            padding: 0.75rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .btn-save:hover {
            background-color: #2563eb;
        }

        .routine-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.2rem 1rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 0.5rem;
        }

        .routine-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .routine-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .routine-item:last-child {
            border-bottom: none;
        }

        .routine-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            margin-right: 0.85rem;
            width: 1.15rem;
            height: 1.15rem;
            border: 1.5px solid var(--checkbox-border);
            border-radius: 5px;
            background-color: transparent;
            display: inline-grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .routine-item input[type="checkbox"]::before {
            content: "";
            width: 0.55rem;
            height: 0.55rem;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
            transform: scale(0);
            transform-origin: center;
            transition: transform 0.1s ease-in-out;
            background-color: #ffffff;
        }

        .routine-item input[type="checkbox"]:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 6px var(--accent-glow);
        }

        .routine-item input[type="checkbox"]:checked::before {
            transform: scale(1);
        }

        .routine-item label {
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-color);
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .routine-item input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: var(--checked-color);
        }

        .note {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
            display: inline-block;
        }

        .notes-area {
            width: 100%;
            min-height: 80px;
            background-color: transparent;
            border: none;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            outline: none;
            padding: 0.4rem 0;
            box-sizing: border-box;
        }

        .history-section {
            margin-top: 2rem;
            border-top: 1px dashed var(--border-color);
            padding-top: 1.25rem;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .history-item {
            background-color: #111215;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            border-color: #4b5263;
            background-color: var(--card-bg);
        }

        .history-date { font-size: 0.85rem; font-weight: 500; }
        .history-score { font-size: 0.75rem; color: var(--text-muted); }

            display: none;
            position: fixed
