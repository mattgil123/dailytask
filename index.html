<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Routine</title>
    <style>
        :root {
            --bg-color: #0b0c0e;
            --card-bg: #16171a;
            --text-color: #f3f4f6;
            --text-muted: #8e939e;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --border-color: #26282c;
            --checked-color: #4b5263;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 3rem 1.5rem;
            max-width: 480px;
            margin: 0 auto;
            -webkit-font-smoothing: antialiased;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin: 0;
            color: #ffffff;
        }

        h2 {
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-top: 2.5rem;
            margin-bottom: 1.25rem;
            color: var(--text-muted);
        }

        .btn-refresh {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-refresh:hover {
            background-color: var(--card-bg);
            border-color: #4b5263;
        }

        .routine-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.5rem 1.25rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .routine-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .routine-item {
            display: flex;
            align-items: flex-start;
            padding: 0.9rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .routine-item:last-child {
            border-bottom: none;
        }

        /* Custom Checkbox Design matching modern AI platforms */
        .routine-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            margin-right: 1.1rem;
            margin-top: 0.2rem;
            width: 1.2rem;
            height: 1.2rem;
            border: 1px solid #3f444e;
            border-radius: 6px;
            background-color: transparent;
            display: inline-grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .routine-item input[type="checkbox"]::before {
            content: "";
            width: 0.6rem;
            height: 0.6rem;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
            transform: scale(0);
            transform-origin: center;
            transition: transform 0.1s ease-in-out;
            background-color: #ffffff;
        }

        .routine-item input[type="checkbox"]:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .routine-item input[type="checkbox"]:checked::before {
            transform: scale(1);
        }

        .routine-item label {
            cursor: pointer;
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-color);
            transition: all 0.2s ease;
            user-select: none;
        }

        .routine-item input[type="checkbox"]:checked + label {
            text-decoration: line-through;
            color: var(--checked-color);
        }

        .note {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.15rem;
            display: block;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    </header>

    <main>

                <li class="routine-item">
                    <input type="checkbox" id="item5">
                    <label for="item5">Shower</label>

                <li class="routine-item">
                    <input type="checkbox" id="item6">

                <li class="routine-item">

                <li class="routine-item">

                <li class="routine-item">

        <div class="routine-card">

                    <input type="checkbox" id="item11">

                <li class="routine-item">
                    <input type="checkbox" id="item14">
                    <label for="item14">Bible & Prayer</label>

                <li class="routine-item">
                    <input type="checkbox" id="item15">
