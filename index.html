<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0c10">
<title>// DAILY ROUTINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0a0c10;
    --bg-surface:   #0f1117;
    --bg-card:      #131619;
    --bg-hover:     #181c20;
    --green:        #3ddc84;
    --green-dim:    #1a5c38;
    --green-subtle: #0c1f15;
    --amber:        #c8a84b;
    --amber-dim:    #6b570f;
    --text:         #c8cdd6;
    --text-muted:   #5a6070;
    --text-dim:     #333840;
    --border:       #1e2228;
    --border-mid:   #2a2f38;
    --mono:         'JetBrains Mono', 'Courier New', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .shell { max-width: 720px; margin: 0 auto; padding: 0 20px 80px; }

  header { padding: 36px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .site-title { font-size: 14px; font-weight: 600; color: var(--green); letter-spacing: 0.04em; }
  .header-meta { font-size: 11px; color: var(--text-muted); }
  .header-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  .header-sub span { color: var(--text-dim); }

  .progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 32px; }
  .progress-bar { flex: 1; height: 2px; background: var(--border-mid); }
  .progress-fill { height: 100%; background: var(--green); transition: width 0.3s ease; }
  .progress-stat { font-size: 11px; color: var(--green); min-width: 48px; text-align: right; }

  .section-line {
    display: flex; align-items: center; gap: 10px;
    margin: 24px 0 6px; color: var(--text-dim);
    font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .section-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .task-list { list-style: none; display: flex; flex-direction: column; gap: 1px; }
  .task-item {
    display: flex; align-items: center; gap: 14px; padding: 9px 12px;
    cursor: pointer; border: 1px solid transparent; border-radius: 2px;
    transition: background 0.1s, border-color 0.1s;
  }
  .task-item:hover { background: var(--bg-hover); border-color: var(--border); }
  .task-item.done  { background: var(--green-subtle); border-color: var(--green-dim); }

  .task-item input[type="checkbox"] {
    appearance: none; -webkit-appearance: none;
    width: 14px; height: 14px; border: 1px solid var(--text-dim);
    border-radius: 1px; background: transparent; cursor: pointer;
    flex-shrink: 0; position: relative; transition: border-color 0.1s, background 0.1s;
  }
  .task-item input[type="checkbox"]:checked { background: var(--green); border-color: var(--green); }
  .task-item input[type="checkbox"]:checked::after {
    content: ''; position: absolute; left: 3px; top: 1px; width: 5px; height: 8px;
    border: 1.5px solid var(--bg); border-top: none; border-left: none; transform: rotate(45deg);
  }
  .task-num { font-size: 10px; color: var(--text-dim); min-width: 22px; flex-shrink: 0; }
  .task-item.done .task-num { color: var(--green-dim); }
  .task-label { flex: 1; font-size: 13px; font-weight: 300; color: var(--text); user-select: none; transition: color 0.1s; }
  .task-item.done .task-label { color: var(--green-dim); text-decoration: line-through; text-decoration-color: var(--green-dim); }

  .notes-wrap { margin-top: 4px; }
